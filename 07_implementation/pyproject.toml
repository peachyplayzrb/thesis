[tool.ruff]
line-length = 100
target-version = "py314"
force-exclude = true
extend-exclude = [
  "tests/**",
  "mentor_feedback_submission/src/**/outputs/**",
  "src/**/outputs/**",
  "_scratch/**",
  "_deep_archive_march2026/**",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["src"]
